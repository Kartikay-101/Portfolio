<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="title desc">
  <title id="title">ZeroTrace encrypted chat application</title>
  <desc id="desc">A stylised secure chat interface with a lock, messages, and encryption symbols.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1530"/>
      <stop offset="1" stop-color="#30215c"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b794f4"/>
      <stop offset="1" stop-color="#64e7d7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="28" fill="url(#background)"/>
  <circle cx="93" cy="61" r="100" fill="#ffffff" opacity=".04"/>
  <text x="55" y="70" fill="#faf7ff" font-family="Arial, sans-serif" font-size="27" font-weight="700">ZeroTrace</text>
  <text x="55" y="99" fill="#d6cdea" font-family="Arial, sans-serif" font-size="16">End-to-end encrypted messaging</text>
  <rect x="54" y="132" width="692" height="286" rx="20" fill="#ffffff" opacity=".09"/>
  <rect x="54" y="132" width="160" height="286" rx="20" fill="#ffffff" opacity=".06"/>
  <g fill="#f5f0ff" font-family="Arial, sans-serif">
    <circle cx="87" cy="176" r="17" fill="#64e7d7" opacity=".85"/><text x="116" y="181" font-size="15">Secure chat</text>
    <circle cx="87" cy="231" r="17" fill="#b794f4" opacity=".85"/><text x="116" y="236" font-size="15">Team room</text>
    <circle cx="87" cy="286" r="17" fill="#f6c85f" opacity=".85"/><text x="116" y="291" font-size="15">Private note</text>
  </g>
  <rect x="244" y="154" width="474" height="54" rx="12" fill="#ffffff" opacity=".07"/>
  <g fill="none" stroke="#64e7d7" stroke-width="6" stroke-linecap="round"><rect x="275" y="169" width="26" height="24" rx="4"/><path d="M281 169v-8a7 7 0 0 1 14 0v8"/></g>
  <text x="321" y="187" fill="#faf7ff" font-family="Arial, sans-serif" font-size="17" font-weight="700">Messages are protected</text>
  <rect x="271" y="234" width="286" height="51" rx="16" fill="#ffffff" opacity=".1"/>
  <text x="293" y="265" fill="#f3eff9" font-family="Arial, sans-serif" font-size="15">Report has been encrypted.</text>
  <rect x="408" y="307" width="279" height="51" rx="16" fill="url(#bubble)"/>
  <text x="432" y="338" fill="#1b1730" font-family="Arial, sans-serif" font-size="15" font-weight="700">Delivered securely.</text>
  <rect x="271" y="378" width="416" height="17" rx="8.5" fill="#ffffff" opacity=".1"/>
  <circle cx="661" cy="386.5" r="17" fill="#64e7d7"/>
  <path d="M654 386l5 5 9-11" fill="none" stroke="#1c1530" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
